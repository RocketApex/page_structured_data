name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Ruby ${{ matrix.ruby }} / ${{ matrix.rails }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ruby: "3.1"
            rails: "Rails 7.0"
            gemfile: "gemfiles/rails_7_0.gemfile"
          - ruby: "3.2"
            rails: "Rails 7.1"
            gemfile: "gemfiles/rails_7_1.gemfile"
          - ruby: "3.3"
            rails: "Rails 7.2"
            gemfile: "gemfiles/rails_7_2.gemfile"
          - ruby: "3.3"
            rails: "Rails 8.0"
            gemfile: "gemfiles/rails_8_0.gemfile"
          - ruby: "3.3"
            rails: "Rails 8.1"
            gemfile: "gemfiles/rails_8_1.gemfile"

    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

      - name: Verify require
        run: ruby -Ilib -e 'require "page_structured_data"; puts PageStructuredData::VERSION'

      - name: Build gem
        run: gem build page_structured_data.gemspec
