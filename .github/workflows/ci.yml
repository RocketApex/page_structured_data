name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    name: Ruby 3.1 / Rails 7.0
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1"
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

      - name: Verify require
        run: ruby -Ilib -e 'require "page_structured_data"; puts PageStructuredData::VERSION'

      - name: Build gem
        run: gem build page_structured_data.gemspec
